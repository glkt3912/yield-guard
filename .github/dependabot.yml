version: 2

updates:
  - package-ecosystem: gomod
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 1
    groups:
      all-dependencies:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 1
    groups:
      all-dependencies:
        patterns:
          - "*"
